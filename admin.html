<!DOCTYPE html>
<html>
<head>
<title>MajdoorConnect Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:30px;
}

h1{
color:#222;
}

.section{
background:white;
padding:20px;
margin-bottom:25px;
border-radius:10px;
}

.card{
padding:10px;
border-bottom:1px solid #ddd;
}

button{
padding:6px 10px;
margin-left:5px;
background:#2f80ed;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.reject{
background:red;
}

.suspend{
background:orange;
}

</style>
</head>
<body>
<script>

const password = prompt("Enter Admin Password")

if(password !== "@Gulabo4469"){
alert("Access Denied")
window.location.href="/"
}

</script>

<h1>MajdoorConnect Admin Dashboard</h1>
<h3>Worker Status</h3>
<div class="section">
<h2>Analytics</h2>
<p>Total Workers: <span id="workersCount">0</span></p>
<p>Approved Workers: <span id="approvedCount">0</span></p>
<p>Total Bookings: <span id="bookingCount">0</span></p>
<p>Completed Jobs: <span id="completedCount">0</span></p>
</div>
<div class="section">
<h2>Worker Management</h2>
<div id="workers"></div>
</div>
<div class="section">
<h2>Booking Management</h2>
<div id="bookings"></div>
</div>
<div class="section">
  <h2>Customers</h2>
<div id="customers"></div>
</div>
<div class="section">
<h2>Complaints</h2>
<div id="complaints"></div>
</div>
<script>

const supabaseUrl = "https://agyckzqfklwyjotyaotr.supabase.co"
const supabaseKey = "sb_publishable_Goa6r58YrYEzipGH0mjymA_khUvhFDz"

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)



async function loadAnalytics(){

const {data:workers} = await supabase.from("workers").select("*")
const {data:bookings} = await supabase.from("bookings").select("*")

const approved = workers.filter(w=>w.verification_status==="verified")
const completed = bookings.filter(b=>b.status==="completed")

document.getElementById("workersCount").innerText = workers.length
document.getElementById("approvedCount").innerText = approved.length
document.getElementById("bookingCount").innerText = bookings.length
document.getElementById("completedCount").innerText = completed.length

}



async function loadWorkers(){

const {data} = await supabase.from("workers").select("*")

const container = document.getElementById("workers")

container.innerHTML=""

data.forEach(worker=>{

const div = document.createElement("div")

div.className="card"

div.innerHTML=`

<b>${worker.name}</b> - ${worker.skill}

<p>Status: ${worker.verification_status}</p>

<button onclick="verifyWorker('${worker.id}')">Verify</button>

<button onclick="rejectWorker('${worker.id}')">Reject</button>

`

container.appendChild(div)

})

}



async function verifyWorker(id){

await supabase
.from("workers")
.update({verification_status:"verified"})
.eq("id",id)

alert("Worker Verified")

loadWorkers()

}



async function rejectWorker(id){

await supabase
.from("workers")
.update({verification_status:"rejected"})
.eq("id",id)

alert("Worker Rejected")

loadWorkers()

}



async function loadBookings(){

const {data} = await supabase.from("bookings").select("*")

const container = document.getElementById("bookings")

container.innerHTML=""

data.forEach(job=>{

const div = document.createElement("div")

div.className="card"

div.innerHTML=`

Customer: ${job.customer_name}

Worker: ${job.worker_id}

Status: ${job.status}

<button onclick="completeJob('${job.id}')">Mark Completed</button>

`

container.appendChild(div)

})

}



async function completeJob(id){

await supabase
.from("bookings")
.update({status:"completed"})
.eq("id",id)

alert("Job Completed")

loadBookings()

}



async function loadCustomers(){

const {data} = await supabase.from("customers").select("*")

const container = document.getElementById("customers")

container.innerHTML=""

data.forEach(user=>{

const div = document.createElement("div")

div.className="card"

div.innerHTML=`

<b>${user.name}</b>

Phone: ${user.phone}

`

container.appendChild(div)

})

}



async function loadComplaints(){

const {data} = await supabase.from("complaints").select("*")

const container = document.getElementById("complaints")

container.innerHTML=""

data.forEach(c=>{

const div = document.createElement("div")

div.className="card"

div.innerHTML=`

${c.message}

User: ${c.user_id}

`

container.appendChild(div)

})

}



const workerPhone = "9876543210"



async function goOnline(){

await supabase
.from('workers')
.update({ is_online: true })
.eq('phone', workerPhone)

alert("Worker is Online")

}



async function goOffline(){

await supabase
.from('workers')
.update({ is_online: false })
.eq('phone', workerPhone)

alert("Worker is Offline")

}
<script>
// Call all functions after defining them
loadAnalytics()
loadWorkers()
loadBookings()
loadCustomers()
loadComplaints()
</script>
</body>
</html>
